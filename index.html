<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Penguin 😏</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to bottom, #dff6ff, #ffffff);
    margin: 0;
    padding: 20px;
    overflow: hidden;
  }

  h2 {
    font-size: 22px;
  }

  img {
    width: 180px;
    transition: 0.3s;
  }

  .angry {
    animation: shake 0.3s infinite;
  }

  @keyframes shake {
    0% { transform: translate(2px, 2px); }
    50% { transform: translate(-2px, -2px); }
    100% { transform: translate(2px, -2px); }
  }

  .buttons {
    position: relative;
    height: 220px;
  }

  button {
    padding: 12px 25px;
    font-size: 20px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    position: absolute;
  }

  #yes {
    background: #ffd6d6;
    left: 20%;
    top: 50%;
  }

  #no {
    background: #d6ffd6;
    left: 60%;
    top: 50%;
  }

  #message {
    font-size: 26px;
    margin-top: 30px;
    display: none;
  }
</style>
</head>

<body>

<h2>Ila bghiti chi sadi9a akhra da7ki !!</h2>

<!-- 🐧 penguin -->
<img id="penguin" src="1775256180239.png">

<div class="buttons">
  <button id="yes">😄</button>
  <button id="no">😠</button>
</div>

<div id="message"></div>

<script>
let yes = document.getElementById("yes");
let no = document.getElementById("no");
let penguin = document.getElementById("penguin");
let message = document.getElementById("message");

let noSize = 20;

// 😄 YES → يهرب + penguin كيتعصب
function moveYes() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * 180;

  yes.style.left = x + "px";
  yes.style.top = y + "px";

  noSize += 5;
  no.style.fontSize = noSize + "px";

  // penguin angry
  penguin.src = "1775256171361.png";
  penguin.classList.add("angry");
}

yes.addEventListener("mouseover", moveYes);
yes.addEventListener("touchstart", moveYes);

// 😠 NO → message خاصو يبان
no.addEventListener("click", () => {
  message.textContent = "كنت عارفة كاينة غير أنا 😌";
  message.style.display = "block";

  yes.style.display = "none";
  no.style.display = "none";

  // يرجع happy
  penguin.src = "1775256166094.png";
  penguin.classList.remove("angry");
});
</script>

</body>
</html>
